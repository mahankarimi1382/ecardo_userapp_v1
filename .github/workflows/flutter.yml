name: Flutter Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Analyze
        run: |
          flutter analyze > analysis_report.txt 2>&1 || true
          cat analysis_report.txt

      - name: Build Release APK
        run: |
          flutter build apk --release > build_log.txt 2>&1 || true
          if [ ! -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cat build_log.txt
            exit 1
          fi
          echo "APK built successfully!"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Deploy to eCardo Server and Send Notification
        continue-on-error: true
        run: |
          # Get version from pubspec.yaml
          VERSION=$(grep -oP "^version:\s*\K[0-9.]+" pubspec.yaml || echo "1.0.0")
          echo "Deploying version $VERSION"
          
          curl -X POST https://ecardo.ir/github_deploy.php \
            -F "secret=ecardo_secret_deploy_key_2026" \
            -F "app_type=user" \
            -F "version=$VERSION" \
            -F "apk=@build/app/outputs/flutter-apk/app-release.apk"

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build_log.txt
            analysis_report.txt
